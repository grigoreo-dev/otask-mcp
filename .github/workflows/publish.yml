name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.14"

      - name: Install npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          node -v
          npm -v

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      # Trusted Publisher (OIDC): no NODE_AUTH_TOKEN.
      # If secret NPM_TOKEN is set, use it as fallback (granular publish token).
      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "Publishing with NPM_TOKEN secret"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${RUNNER_TEMP}/.npmrc"
            export NPM_CONFIG_USERCONFIG="${RUNNER_TEMP}/.npmrc"
            npm publish --access public
          else
            echo "Publishing with OIDC Trusted Publisher"
            unset NODE_AUTH_TOKEN || true
            unset NPM_CONFIG_USERCONFIG || true
            rm -f "$HOME/.npmrc" || true
            npm publish --access public
          fi
