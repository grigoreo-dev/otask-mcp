name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node >= 22.14 and npm >= 11.5.1
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$PKG node=$(node -v) npm=$(npm -v)"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      # Do NOT set registry-url / NODE_AUTH_TOKEN — empty placeholder breaks OIDC.
      # Trusted Publisher on npmjs.com must allow workflow file: publish.yml
      - name: Publish
        run: npm publish --access public
